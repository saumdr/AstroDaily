name: AstroDaily 每日自动更新

on:
  schedule:
    # 每天早上 9:00 北京时间 = 凌晨 1:00 UTC
    - cron: '0 1 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 检出代码
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # 获取完整历史，用于提交更新

    - name: 🐍 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 📦 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: 📰 生成日报
      run: python astro_daily.py

    - name: 📤 提交更新的日报
      run: |
        git config user.name "AstroDaily Bot"
        git config user.email "bot@astrodaily.local"
        git add astro-daily-archives/ index.html || true
        git diff --cached --quiet || git push || true

    - name: 🚀 部署到 Surge
      env:
        SURGE_<SECRET_REDACTED>
      run: |
        npm install -g surge
        cp astro-daily-archives/astro-daily-*.html astro-daily-live/index.html 2>/dev/null || true
        surge teardown astro-daily-latest.surge.sh || true
        surge --project ./astro-daily-live --domain astro-daily-latest.surge.sh

    - name: 📢 输出访问地址
      run: echo "🌐 日报已更新！访问地址：<ADDRESS_REMOVED>
