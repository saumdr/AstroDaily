name: AstroDaily 每日自动更新

on:
  schedule:
    # 每天早上 9:00 北京时间 = 凌晨 1:00 UTC
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: 生成日报
      run: python astro_daily.py

    - name: 提交更新的日报
      run: |
        git config user.name "AstroDaily Bot"
        git config user.email "bot@astrodaily.local"
        git add index.html || true
        git diff --cached --quiet || (git commit -m "更新日报 $(date +%Y-%m-%d)" && git push) || true

    - name: 部署到 Surge
      env:
        SURGE_LOGIN: "308493389@qq.com"
        SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
      run: |
        npm install -g surge
        surge --project ./ --domain astro-daily-latest.surge.sh

    - name: 输出访问地址
      run: echo "https://astro-daily-latest.surge.sh"
