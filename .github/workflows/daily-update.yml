name: AstroDaily 每日自动更新

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: 生成日报
      run: python astro_daily.py

    - name: 提交更新的日报
      run: |
        git config user.name "AstroDaily Bot"
        git config user.email "bot@astrodaily.local"
        git add astro-daily-archives/ index.html || true
        git diff --cached --quiet || (git commit -m "更新日报 $(date +%Y-%m-%d)" && git push) || true

    - name: 部署到 Surge
      env:
        SURGE_LOGIN: "308493389@qq.com"
        SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
      run: |
        npm install -g surge
        mkdir -p deploy
        cp -r astro-daily-archives/ deploy/
        cp index.html deploy/
        LATEST=$(ls -t astro-daily-archives/astro-daily-*.html 2>/dev/null | head -1)
        if grep -q "今日暂无新论文" "$LATEST" 2>/dev/null; then
          for f in $(ls -t astro-daily-archives/astro-daily-*.html 2>/dev/null); do
            if ! grep -q "今日暂无新论文" "$f" 2>/dev/null; then
              cp "$f" deploy/index.html
              echo "valid: $f"
              break
            fi
          done
        else
          cp "$LATEST" deploy/index.html
          echo "latest: $LATEST"
        fi
        ls -la deploy/
        surge --project ./deploy --domain astro-daily-latest.surge.sh

    - name: 输出访问地址
      run: echo "https://astro-daily-latest.surge.sh"
