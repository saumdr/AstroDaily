name: AstroDaily 每日自动更新

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: 生成日报
      run: python astro_daily.py

    - name: 提交更新的日报
      run: |
        git config user.name "AstroDaily Bot"
        git config user.email "bot@astrodaily.local"
        git add astro-daily-archives/ index.html || true
        git diff --cached --quiet || (git commit -m "更新日报 $(date +%Y-%m-%d)" && git push) || true

     - name: 部署到 Surge
    env:
      SURGE_LOGIN: "308493389@qq.com"
      SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
    run: |
      npm install -g surge
      mkdir -p deploy
      
      # 获取最新日报文件
      LATEST=$(ls -t astro-daily-archives/astro-daily-*.html 2>/dev/null | head -1)
      
      if [ -n "$LATEST" ]; then
        # 检查是否是无更新提示页面
        if grep -q "今日暂无新论文" "$LATEST" 2>/dev/null; then
          # 找到最近的有效日报（有论文的）
          VALID=$(for f in $(ls -t astro-daily-archives/astro-daily-*.html 2>/dev/null); do
            if ! grep -q "今日暂无新论文" "$f" 2>/dev/null; then
              echo "$f"
              break
            fi
          done)
          if [ -n "$VALID" ]; then
            cp "$VALID" deploy/index.html
            echo "无新论文，部署最近有效日报: $VALID"
          else
            cp "$LATEST" deploy/index.html
            echo "部署提示页面: $LATEST"
          fi
        else
          # 是正常的日报，直接部署
          cp "$LATEST" deploy/index.html
          echo "部署最新日报: $LATEST"
        fi
      else
        cp index.html deploy/index.html 2>/dev/null || echo "未找到文件"
      fi
      
      ls -la deploy/
      surge --project ./deploy --domain astro-daily-latest.surge.sh

    - name: 输出访问地址
      run: echo "https://astro-daily-latest.surge.sh"
