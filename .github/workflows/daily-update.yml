name: AstroDaily 每日自动更新

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: 生成日报
      run: python astro_daily.py

    - name: 提交更新的日报
      run: |
        git config user.name "AstroDaily Bot"
        git config user.email "bot@astrodaily.local"
        git add astro-daily-archives/ index.html || true
        git diff --cached --quiet || (git commit -m "更新日报 $(date +%Y-%m-%d)" && git push) || true

    - name: 部署到 Surge
      env:
        SURGE_LOGIN: "308493389@qq.com"
        SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
      run: |
        npm install -g surge
        mkdir -p deploy
        
        LATEST=$(ls -t astro-daily-archives/astro-daily-*.html 2>/dev/null | head -1)
        
        if [ -n "$LATEST" ]; then
          if grep -q "今日暂无新论文" "$LATEST" 2>/dev/null; then
            VALID=$(grep -L "今日暂无新论文" astro-daily-archives/astro-daily-*.html 2>/dev/null | sort -r | head -1)
            if [ -n "$VALID" ]; then
              cp "$VALID" deploy/index.html
              echo "deploy valid: $VALID"
            else
              cp "$LATEST" deploy/index.html
              echo "deploy no-update page: $LATEST"
            fi
          else
            cp "$LATEST" deploy/index.html
            echo "deploy latest: $LATEST"
          fi
        else
          cp index.html deploy/index.html 2>/dev/null || echo "no file found"
        fi
        
        ls -la deploy/
        surge --project ./deploy --domain astro-daily-latest.surge.sh

    - name: 输出访问地址
      run: echo "https://astro-daily-latest.surge.sh"
